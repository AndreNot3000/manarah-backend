services:
  db:
    image: postgres:16-alpine
    container_name: manarah-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: manarah
      POSTGRES_PASSWORD: manarah
      POSTGRES_DB: manarah
    volumes:
      - manarah_pg_data:/var/lib/postgresql/data

volumes:
  manarah_pg_data:
